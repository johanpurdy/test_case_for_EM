services:
  db:
    image: postgres:14
    env_file: .env
    environment:
      POSTGRES_DB: auth_project_DB
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file: .env

volumes:
  pg_data: